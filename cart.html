<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELORA – Sepetim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="cart-header">
    <a href="index.html" class="logo">VELORA</a>
    <div class="cart-header-right">
      <span class="cart-item-count" id="header-item-count"></span>
      <!-- Dark Mode Toggle -->
      <button class="theme-toggle" onclick="toggleTheme()" title="Karanlık Mod">🌙</button>
      <a href="index.html" class="back-home">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span class="back-home-text">Ana Sayfa</span>
      </a>
    </div>
  </header>

  <!-- SEPET İÇERİĞİ -->
  <div class="cart-page">
    <h1>Sepetim</h1>

    <!-- Ürünler buraya render edilir -->
    <div id="cart-items"></div>

    <!-- KUPON KUTUSU – renderCart() tarafından gösterilip gizlenir -->
    <div class="coupon-box" id="coupon-box" style="display: none;">
      <div class="coupon-input-row">
        <input type="text" id="couponInput" placeholder="Kupon kodunu girin" />
        <button onclick="applyCoupon()">Uygula</button>
      </div>
      <div class="coupon-applied" id="couponApplied" style="display: none;">
        <span id="appliedCodeText"></span>
        <button class="remove-coupon" onclick="removeCoupon()">✕ Kaldır</button>
      </div>
      <p class="coupon-msg" id="couponMsg"></p>
    </div>

    <!-- ÖZET VE ÖDEME -->
    <div class="cart-footer">
      <div class="discount-row" id="discountRow" style="display: none;">
        <span>İndirim</span>
        <span id="discountDisplay"></span>
      </div>
      <h2>Toplam: <span id="total">0</span> TL</h2>
      <button class="checkout" onclick="sendWhatsApp()">ÖDEMEYE GEÇ</button>
    </div>
  </div>

  <script src="script.js"></script>

    

</body>
</html>
