<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELORA – Sepetim</title>

<!-- Font: orijinal Montserrat + Cormorant Garamond (premium başlık fontu) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">

<!-- Mevcut ana stil dosyası -->
<link rel="stylesheet" href="style.css">

<!-- Sepet sayfasına özel stiller -->
<link rel="stylesheet" href="styles/cart.css">
</head>
<body>

<!-- ── HEADER (orijinal yapı birebir korundu) ── -->
<header class="cart-header">
  <a href="index.html" class="logo">VELORA</a>
  <div class="cart-header-right">
    <span class="cart-item-count" id="header-item-count"></span>
    <button class="theme-toggle" onclick="toggleTheme()" title="Karanlık Mod">🌙</button>
    <a href="index.html" class="back-home">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      <span class="back-home-text">Ana Sayfa</span>
    </a>
  </div>
</header>

<!-- ── SAYFA İÇERİĞİ ── -->
<div class="vc-wrap">

  <h1 class="vc-title">Sepetim</h1>
  <p  class="vc-subtitle" id="vc-count-lbl">Yükleniyor…</p>

  <div class="vc-layout">

    <!-- Sol sütun: ürün satırları (cart.js tarafından doldurulur) -->
    <div class="vc-list" id="vc-list"></div>

    <!-- Sağ sütun: sipariş özeti -->
    <aside class="vc-panel">

      <h2 class="vc-panel-title">Sipariş Özeti</h2>

      <div class="vc-line-row">
        <span class="vc-lbl">Ara Toplam</span>
        <span class="vc-val" id="vc-subtotal">0 TL</span>
      </div>
      <div class="vc-line-row">
        <span class="vc-lbl">İndirim</span>
        <span class="vc-val vc-disc" id="vc-discount">—</span>
      </div>
      <div class="vc-line-row">
        <span class="vc-lbl">Kargo</span>
        <span class="vc-free">Ücretsiz</span>
      </div>

      <div class="vc-hr"></div>

      <div class="vc-total-row">
        <span class="vc-total-lbl">Toplam</span>
        <span class="vc-total-amt" id="vc-total">0 TL</span>
      </div>

      <!-- Kupon kodu -->
      <div class="vc-coupon">
        <span class="vc-coupon-lbl">Kupon Kodunuz Var mı?</span>
        <div class="vc-coupon-row">
          <input  type="text"
                  class="vc-coupon-input"
                  id="vc-coupon-input"
                  placeholder="Kod girin"
                  maxlength="20">
          <button class="vc-coupon-apply"
                  id="vc-coupon-btn"
                  onclick="vcApplyCoupon()">Uygula</button>
        </div>
        <p class="vc-coupon-msg" id="vc-coupon-msg"></p>
      </div>

      <!-- Ödeme butonu -->
      <button class="vc-checkout" onclick="sendWhatsApp()">
        Ödemeye Geç &nbsp;→
      </button>

      <!-- Güvenli ödeme rozeti -->
      <div class="vc-secure">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Güvenli Ödeme
      </div>

    </aside>
  </div>

  <!--
    sendWhatsApp() hâlâ #total'ı okur.
    Gizli element — script.js uyumluluğu için burada bırakılmıştır.
  -->
  <span id="total" style="display:none;"></span>

</div>

<!-- Mevcut ana script (toggleTheme, sendWhatsApp vb.) -->
<script src="script.js"></script>

<!-- Sepete özel script -->
<script src="scripts/cart.js"></script>

</body>
</html>
