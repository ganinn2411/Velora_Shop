<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELORA – Favorilerim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <!-- Favicon: altın V ikonu -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='8' fill='%23111'/><text y='72' x='50' text-anchor='middle' font-size='58' font-family='Georgia,serif' fill='%23c9b97a'>V</text></svg>">
<!-- Sekme başlığı -->
<title>VELORA – Hesabım</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="fav-header">
  <a href="index.html" class="logo">VELORA</a>
  <div class="fav-header-right">
    <span class="fav-count" id="fav-count-label"></span>
    <button class="theme-toggle" onclick="toggleTheme()" title="Karanlık Mod">🌙</button>
    <a href="index.html" class="back-home">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      <span class="back-home-text">Ana Sayfa</span>
    </a>
  </div>
</header>

<div class="favorites-container">
  <h2>Favorilerim</h2>
  <div id="favorites-list"></div>
</div>

<div id="toast" class="toast"></div>

<!-- velora-data.js ÖNCE yüklenmeli -->
<script src="velora-data.js"></script>
<script src="script.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    var saved = (JSON.parse(localStorage.getItem("saved")) || []).map(Number);
    var validCount = saved.filter(function(id) {
      return products.find(function(p) { return p.id === id; });
    }).length;
    var el = document.getElementById("fav-count-label");
    if (el) el.textContent = validCount > 0 ? validCount + " ürün" : "";
  });
</script>
</body>
</html>
